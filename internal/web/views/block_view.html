{{define "content"}}
<div class="page-header">
    <h1>{{.Block.Name}}</h1>
    <div class="header-actions">
        <a href="/templates/builder" class="btn btn-secondary">Use in Builder</a>
        <a href="/blocks/{{.Block.ID}}/edit" class="btn btn-primary">Edit</a>
        <form method="post" action="/blocks/{{.Block.ID}}/delete" style="display:inline;" onsubmit="return confirm('Delete this block?')">
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>

<div class="card" style="margin-bottom:1rem;">
    <div class="card-body">
        <table class="detail-table">
            <tr>
                <th>Category</th>
                <td><span class="badge">{{.Block.Category}}</span></td>
            </tr>
            {{if .Block.PreviewText}}
            <tr>
                <th>Description</th>
                <td>{{.Block.PreviewText}}</td>
            </tr>
            {{end}}
            <tr>
                <th>Created</th>
                <td>{{.Block.CreatedAt.Format "2006-01-02 15:04"}}</td>
            </tr>
            <tr>
                <th>Updated</th>
                <td>{{.Block.UpdatedAt.Format "2006-01-02 15:04"}}</td>
            </tr>
        </table>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="tabs">
            <button class="tab active" data-tab="preview">Preview</button>
            <button class="tab" data-tab="source">HTML Source</button>
        </div>
    </div>
    <div class="card-body">
        <div id="tab-preview" class="tab-content active">
            <div style="background:#f5f5f5; padding:1rem; border-radius:var(--radius); max-width:640px; margin:0 auto;">
                <iframe id="preview-frame" style="width:600px; height:400px; border:none; display:block; margin:0 auto;"></iframe>
            </div>
        </div>
        <div id="tab-source" class="tab-content" style="display:none;">
            <textarea class="input" readonly rows="20"
                style="font-family:monospace; font-size:13px; tab-size:2; width:100%;">{{.Block.HTML}}</textarea>
        </div>
    </div>
</div>

<script>
(function() {
    // Tabs
    document.querySelectorAll('.tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.style.display = 'none'; c.classList.remove('active'); });
            this.classList.add('active');
            var target = document.getElementById('tab-' + this.dataset.tab);
            target.style.display = 'block';
            target.classList.add('active');
        });
    });

    // Preview — render block HTML with test values from localStorage
    var frame = document.getElementById('preview-frame');
    var html = {{toJSON .Block.HTML}};
    var testValues = JSON.parse(localStorage.getItem('sendry_test_values') || '{}');

    // Apply test values
    var content = html;
    for (var key in testValues) {
        if (testValues[key]) {
            content = content.split('{{"{{"}}' + key + '}}').join(testValues[key]);
        }
    }
    // Remaining variables — show as grey badges
    var varRe = new RegExp('\\{\\{(\\w+)\\}\\}', 'g');
    content = content.replace(varRe, function(m, name) {
        return '<span style="background:#E4E4E4;color:#959595;padding:2px 6px;border-radius:3px;font-size:11px;font-family:monospace;">' + name + '</span>';
    });

    // Wrap in table if block contains <tr> (email blocks are table rows)
    var stripped = content.replace(/<!--[\s\S]*?-->/g, '').trim().toLowerCase();
    if (stripped.indexOf('<tr') === 0) {
        content = '<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0">' + content + '</table>';
    }
    frame.srcdoc = '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;padding:0;}</style></head><body>' + content + '</body></html>';
})();
</script>
{{end}}
