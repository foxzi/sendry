{{define "content"}}
<style>
.builder-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 1rem;
    min-height: calc(100vh - 180px);
}

/* Sidebar: Block catalog */
.builder-sidebar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    max-height: calc(100vh - 180px);
    position: sticky;
    top: 80px;
}

.builder-sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.875rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.block-category {
    border-bottom: 1px solid var(--border);
}

.block-category:last-child {
    border-bottom: none;
}

.block-category-header {
    padding: 0.75rem 1rem;
    font-weight: 600;
    font-size: 0.875rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    transition: background 0.15s;
}

.block-category-header:hover {
    background: var(--bg);
}

.block-category-header .chevron {
    transition: transform 0.2s;
    font-size: 0.75rem;
    color: var(--text-muted);
}

.block-category.open .chevron {
    transform: rotate(90deg);
}

.block-category-items {
    display: none;
    padding: 0.25rem 0.5rem 0.5rem;
}

.block-category.open .block-category-items {
    display: block;
}

.block-card {
    padding: 0.5rem 0.75rem;
    margin: 0.25rem 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.8125rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.block-card:hover {
    border-color: var(--primary);
    background: var(--bg);
}

.block-card-icon {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
}

/* Main area */
.builder-main {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

/* Form fields */
.builder-form {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
}

.builder-form .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.builder-form .form-group {
    margin-bottom: 0.75rem;
}

.builder-form .form-group:last-child {
    margin-bottom: 0;
}

/* Canvas: assembled email */
.builder-canvas {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    flex: 1;
    display: flex;
    flex-direction: column;
}

.builder-canvas-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.875rem;
}

.builder-canvas-body {
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
    min-height: 300px;
}

.builder-canvas-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 0.875rem;
}

/* Block items in canvas */
.builder-block {
    position: relative;
    border: 1px solid transparent;
    border-radius: var(--radius);
    margin-bottom: 0.5rem;
    transition: border-color 0.15s;
}

.builder-block:hover {
    border-color: var(--primary);
}

.builder-block.dragging {
    opacity: 0.5;
}

.builder-block-controls {
    position: absolute;
    top: -1px;
    right: -1px;
    display: none;
    gap: 0.25rem;
    background: var(--bg-card);
    border: 1px solid var(--primary);
    border-radius: 0 var(--radius) 0 var(--radius);
    padding: 0.25rem 0.5rem;
    z-index: 10;
}

.builder-block:hover .builder-block-controls {
    display: flex;
}

.builder-block-controls button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.125rem 0.25rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-radius: 3px;
    line-height: 1;
}

.builder-block-controls button:hover {
    background: var(--bg);
    color: var(--text);
}

.builder-block-label {
    position: absolute;
    top: -1px;
    left: -1px;
    display: none;
    font-size: 0.6875rem;
    background: var(--primary);
    color: white;
    padding: 0.125rem 0.5rem;
    border-radius: var(--radius) 0 var(--radius) 0;
    z-index: 10;
}

.builder-block:hover .builder-block-label {
    display: block;
}

.builder-block-preview {
    pointer-events: none;
    overflow: hidden;
    border-radius: var(--radius);
}

/* Drop zone indicator */
.builder-drop-zone {
    height: 4px;
    margin: 0.25rem 0;
    border-radius: 2px;
    transition: all 0.15s;
}

.builder-drop-zone.active {
    height: 40px;
    background: var(--primary);
    opacity: 0.15;
    border: 2px dashed var(--primary);
}

/* Preview panel */
.builder-preview-container {
    background: #f4f4f4;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.builder-preview-frame {
    width: 600px;
    background: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Canvas tabs */
.canvas-tabs {
    display: flex;
    gap: 0.5rem;
}

.canvas-tab {
    padding: 0.25rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    font-size: 0.8125rem;
    color: var(--text-muted);
}

.canvas-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

/* Footer actions */
.builder-actions {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.block-count {
    font-size: 0.8125rem;
    color: var(--text-muted);
}

@media (max-width: 768px) {
    .builder-layout {
        grid-template-columns: 1fr;
    }
    .builder-sidebar {
        position: static;
        max-height: none;
    }
}
</style>

<div class="page-header">
    <h1>Email Builder</h1>
    <div class="header-actions">
        <a href="/templates" class="btn btn-secondary">Back to Templates</a>
    </div>
</div>

<form method="post" action="/templates/builder" id="builder-form">
    <div class="builder-layout">
        <div class="builder-sidebar">
            <div class="builder-sidebar-header">Block Library</div>
            {{range .Categories}}
            <div class="block-category open" data-category="{{.ID}}">
                <div class="block-category-header" onclick="this.parentElement.classList.toggle('open')">
                    <span>{{.Name}} ({{len .Blocks}})</span>
                    <span class="chevron">&#9654;</span>
                </div>
                <div class="block-category-items">
                    {{range .Blocks}}
                    <div class="block-card" data-block-id="{{.ID}}" data-block-name="{{.Name}}" title="Click to add">
                        <div class="block-card-icon">+</div>
                        <span>{{.Name}}</span>
                    </div>
                    {{end}}
                </div>
            </div>
            {{end}}
        </div>

        <div class="builder-main">
            <div class="builder-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Template Name *</label>
                        <input type="text" id="name" name="name" required class="input" placeholder="Welcome Email">
                    </div>
                    <div class="form-group">
                        <label for="folder">Folder</label>
                        <input type="text" id="folder" name="folder" class="input" placeholder="marketing" list="folders">
                        <datalist id="folders">
                            {{range .Folders}}
                            <option value="{{.}}">
                            {{end}}
                        </datalist>
                    </div>
                </div>
                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" name="subject" required class="input" placeholder="Welcome to your company!">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" class="input" placeholder="Brief description of this template">
                </div>
            </div>

            <div class="builder-canvas">
                <div class="builder-canvas-header">
                    <div class="canvas-tabs">
                        <button type="button" class="canvas-tab active" data-tab="build">Build</button>
                        <button type="button" class="canvas-tab" data-tab="preview">Preview</button>
                        <button type="button" class="canvas-tab" data-tab="code">HTML Code</button>
                    </div>
                    <span class="block-count" id="block-count">0 blocks</span>
                </div>

                <div class="builder-canvas-body" id="canvas-build" style="overflow-x:auto;">
                    <div class="builder-canvas-empty" id="canvas-empty">
                        Click blocks on the left to add them to your email
                    </div>
                    <div id="canvas-blocks" style="min-width:600px;"></div>
                </div>

                <div class="builder-canvas-body" id="canvas-preview" style="display:none;">
                    <div style="display:flex; gap:0.5rem; margin-bottom:0.75rem;">
                        <button type="button" class="btn btn-sm btn-primary" data-preview-width="600" onclick="setPreviewWidth(600, this)">Desktop (600px)</button>
                        <button type="button" class="btn btn-sm btn-secondary" data-preview-width="375" onclick="setPreviewWidth(375, this)">Mobile (375px)</button>
                    </div>
                    <div class="builder-preview-container" style="background:#f5f5f5; padding:1rem; border-radius:var(--radius); overflow-x:auto;">
                        <div class="builder-preview-frame" id="preview-frame" style="width:600px; margin:0 auto; transition:width 0.3s;"></div>
                    </div>
                </div>

                <div class="builder-canvas-body" id="canvas-code" style="display:none;">
                    <textarea id="code-output" class="input code" rows="20" readonly style="font-family:monospace; font-size:12px; width:100%;"></textarea>
                </div>

                <div class="builder-actions">
                    <div>
                        <button type="button" class="btn btn-sm btn-secondary" id="btn-clear">Clear All</button>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <a href="/templates" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="btn-create">Create Template</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="hidden" name="html" id="html-hidden">
    <input type="hidden" name="variables" id="variables-hidden">
</form>

<script>
function setPreviewWidth(w, btn) {
    var frame = document.getElementById('preview-frame');
    frame.style.width = w + 'px';
    // Also resize the iframe inside
    var iframe = frame.querySelector('iframe');
    if (iframe) iframe.style.width = w + 'px';
    btn.parentElement.querySelectorAll('[data-preview-width]').forEach(function(t) {
        t.className = 'btn btn-sm btn-secondary';
    });
    btn.className = 'btn btn-sm btn-primary';
}

window.__builderData = {
    categories: {{toJSON .Categories}},
    wrapper: {{toJSON .Wrapper}}
};
</script>
<script src="/static/js/builder.js"></script>
{{end}}
