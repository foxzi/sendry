<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light only">
  <title>{{.Subject}}</title>
  <!--[if mso]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <style>
    table {border-collapse: collapse;}
    td, th {mso-line-height-rule: exactly;}
  </style>
  <![endif]-->
  <style type="text/css">
    :root { color-scheme: light only; supported-color-schemes: light only; }

    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }

    @media only screen and (max-width: 480px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .fluid-table { width: 100% !important; }
      .fluid { width: 100% !important; max-width: 100% !important; height: auto !important; }
      .stack { display: block !important; width: 100% !important; }
      .pad-mobile { padding-left: 16px !important; padding-right: 16px !important; }
      .text-center-mobile { text-align: center !important; }
      .hide-mobile { display: none !important; }
      .font-mobile-sm { font-size: 24px !important; line-height: 30px !important; }
    }

    @media (prefers-color-scheme: dark) {
      body, .force-page-bg {
        background-color: #1C1C1E !important;
      }
      .email-container {
        background-color: #2C2C2E !important;
      }
      .force-bg-white,
      table.force-bg-white,
      td.force-bg-white {
        background-color: #2C2C2E !important;
      }
      .force-text-dark { color: #E4E4E4 !important; }
      .force-text-muted { color: #9A9A9A !important; }
      .force-text-black { color: #FFFFFF !important; }
      .email-container [style*="color:#262B26"],
      .email-container [style*="color: #262B26"],
      .email-container [style*="color:#000000"],
      .email-container [style*="color: #000000"],
      .email-container [style*="color:#000001"],
      .email-container [style*="color: #000001"] {
        color: #E4E4E4 !important;
      }
      .email-container [style*="color:#959595"],
      .email-container [style*="color: #959595"] {
        color: #9A9A9A !important;
      }
      .email-container [style*="border-top:1px solid #E4E4E4"],
      .email-container [style*="border-top: 1px solid #E4E4E4"],
      .email-container [style*="border-bottom:1px solid #E4E4E4"],
      .email-container [style*="border-bottom: 1px solid #E4E4E4"] {
        border-color: #3A3A3C !important;
      }
      .email-container [style*="background:#F5F5F5"],
      .email-container [style*="background: #F5F5F5"],
      .email-container [style*="background-color:#F5F5F5"],
      .email-container [style*="background-color: #F5F5F5"] {
        background-color: #3A3A3C !important;
      }
    }

    [data-ogsc] .force-bg-white,
    [data-ogsb] .force-bg-white { background-color: #FEFFFE !important; }
    [data-ogsc] .force-text-dark,
    [data-ogsb] .force-text-dark { color: #262B26 !important; }
    [data-ogsc] .force-text-muted,
    [data-ogsb] .force-text-muted { color: #959595 !important; }
    [data-ogsc] .force-text-black,
    [data-ogsb] .force-text-black { color: #000001 !important; }
  </style>
</head>
<body bgcolor="{{PAGE_BG}}" style="margin:0; padding:0; background-color:{{PAGE_BG}}; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="{{PAGE_BG}}" style="background-color:{{PAGE_BG}};">
    <tr>
      <td align="center" style="padding:{{CONTAINER_PADDING_V}}px {{CONTAINER_PADDING_H}}px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" class="email-container" bgcolor="{{CONTAINER_BG}}" style="background-color:{{CONTAINER_BG}}; border-radius:{{CONTAINER_RADIUS}}; overflow:hidden; width:{{CONTAINER_WIDTH}}px; max-width:{{CONTAINER_WIDTH}}px;">
          {{BLOCKS}}
        </table>
        <!--[if mso]></td></tr></table><![endif]-->
      </td>
    </tr>
  </table>
</body>
</html>
